name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  prepare:
    name: Determine version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        run: |
          v=$(grep -oP 'project\(MonarchOfTone VERSION \K[0-9.]+' CMakeLists.txt)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building release for version $v"

  macos:
    name: macOS (AU + VST3)
    needs: prepare
    runs-on: macos-14
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build AU + VST3
        run: cmake --build build --config Release --target Monarch_AU --target Monarch_VST3 --parallel

      - name: Locate artifacts
        id: artifacts
        run: |
          au=$(find build/Monarch_artefacts/Release/AU -maxdepth 1 -name "*.component")
          vst3=$(find build/Monarch_artefacts/Release/VST3 -maxdepth 1 -name "*.vst3")
          echo "au=$au" >> "$GITHUB_OUTPUT"
          echo "vst3=$vst3" >> "$GITHUB_OUTPUT"

      # ---- Apple code signing + notarization — DISABLED until Apple secrets are added. ----
      # Uncomment this whole block (and the HAS_APPLE_SIGNING env var above, restored as:
      #   HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERT_P12_BASE64 != '' }}
      # ) once the 6 secrets in README's "Releasing" section are set. Left here complete and
      # ready rather than deleted, so turning signing on is an uncomment, not a rewrite.
