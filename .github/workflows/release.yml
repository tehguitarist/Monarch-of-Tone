      #     security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
      #     security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
      #     security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
      #     security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" \
      #       -T /usr/bin/codesign -T /usr/bin/security
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
      #     security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
      #     rm -f "$RUNNER_TEMP/cert.p12"
      #
      # - name: Codesign AU + VST3
      #   if: ${{ env.HAS_APPLE_SIGNING == 'true' }}
      #   env:
      #     APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      #   run: |
      #     for bundle in "${{ steps.artifacts.outputs.au }}" "${{ steps.artifacts.outputs.vst3 }}"; do
      #       codesign --force --deep --options runtime --timestamp \
      #         --sign "$APPLE_SIGNING_IDENTITY" "$bundle"
      #       codesign --verify --deep --strict "$bundle"
      #     done
      #
      # - name: Notarize and staple
      #   if: ${{ env.HAS_APPLE_SIGNING == 'true' }}
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #   run: |
      #     ditto -c -k --keepParent "${{ steps.artifacts.outputs.au }}" "$RUNNER_TEMP/au-notarize.zip"
      #     ditto -c -k --keepParent "${{ steps.artifacts.outputs.vst3 }}" "$RUNNER_TEMP/vst3-notarize.zip"
      #
      #     xcrun notarytool submit "$RUNNER_TEMP/au-notarize.zip" \
      #       --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
      #     xcrun notarytool submit "$RUNNER_TEMP/vst3-notarize.zip" \
      #       --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
      #
      #     xcrun stapler staple "${{ steps.artifacts.outputs.au }}"
      #     xcrun stapler staple "${{ steps.artifacts.outputs.vst3 }}"

      - name: Note unsigned build
        run: echo "::warning::macOS signing is disabled (Apple secrets not yet added) — shipping an UNSIGNED macOS build. See README 'Releasing' for the secrets needed to sign/notarize."

      - name: Package zip
        run: |
          mkdir -p dist
          cd build/Monarch_artefacts/Release
          zip -r "$GITHUB_WORKSPACE/dist/Monarch-of-Tone-${VERSION}-macOS.zip" AU VST3
          cd "$GITHUB_WORKSPACE"

      - uses: actions/upload-artifact@v7
        with:
          name: macOS-zip
          path: dist/*.zip

  windows:
    name: Windows (VST3)
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Monarch_VST3 --parallel

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/Monarch_artefacts/Release/VST3/*" `
            -DestinationPath "dist/Monarch-of-Tone-$env:VERSION-Windows.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: Windows-zip
          path: dist/*.zip

  linux:
    name: Linux (VST3)
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev \
            libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Monarch_VST3 --parallel

      - name: Package zip
        run: |
          mkdir -p dist
          cd build/Monarch_artefacts/Release
          zip -r "$GITHUB_WORKSPACE/dist/Monarch-of-Tone-${VERSION}-Linux.zip" VST3
          cd "$GITHUB_WORKSPACE"

      - uses: actions/upload-artifact@v7
        with:
          name: Linux-zip
          path: dist/*.zip

  publish:
    name: Publish GitHub Release
    needs: [prepare, macos, windows, linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.prepare.outputs.version }}"
          name: "Monarch of Tone v${{ needs.prepare.outputs.version }}"
          files: dist/*.zip
          generate_release_notes: true
