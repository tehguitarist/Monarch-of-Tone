name: Release

# Manual trigger ONLY — this workflow has no push/schedule trigger, so it never runs unless
# someone explicitly starts it from the Actions tab ("Run workflow") or `gh workflow run
# release.yml`. Builds AU+VST3 for macOS (VST3-only for Windows/Linux), zips one archive per
# platform, and publishes them — plus a per-platform installer — to a GitHub Release tagged
# from the version in CMakeLists.txt.
#
# macOS artifacts are signed with a Developer ID Application certificate and notarized via
# notarytool once the six secrets below are set (until then they ship unsigned with a warning):
# APPLE_CERT_P12_BASE64, APPLE_CERT_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_TEAM_ID, APPLE_ID,
# APPLE_APP_SPECIFIC_PASSWORD.
#
# Each platform also gets a basic installer built from installer/<platform>/ alongside the raw
# zip: a .pkg on macOS (AU/VST3 choice screen, both selected by default), a .exe on Windows
# (NSIS, VST3 only), and a .deb on Linux (VST3 only). The macOS .pkg wraps the already-signed-
# and-notarized AU/VST3 bundles, but the .pkg installer itself is NOT signed (that needs a
# separate "Developer ID Installer" cert, not provisioned here) — Gatekeeper checks the bundles
# when a host loads them, not the installer wrapper, so this is fine for distribution, though
# double-clicking the .pkg directly may show an "unidentified developer" prompt.

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as a draft release (review before publishing)"
        type: boolean
        default: true

jobs:
  prepare:
    name: Determine version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        run: |
          v=$(grep -oP 'project\(MonarchOfTone VERSION \K[0-9.]+' CMakeLists.txt)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building release for version $v"

  macos:
    name: macOS (AU + VST3)
    needs: prepare
    runs-on: macos-14
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERT_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build AU + VST3
        run: cmake --build build --config Release --target Monarch_AU --target Monarch_VST3 --parallel

      - name: Locate artifacts
        id: artifacts
        run: |
          au=$(find build/Monarch_artefacts/Release/AU -maxdepth 1 -name "*.component")
          vst3=$(find build/Monarch_artefacts/Release/VST3 -maxdepth 1 -name "*.vst3")
          echo "au=$au" >> "$GITHUB_OUTPUT"
          echo "vst3=$vst3" >> "$GITHUB_OUTPUT"

      # ---- Apple code signing + notarization — enabled once the 6 secrets below are set. ----
      - name: Import Developer ID certificate
        if: ${{ env.HAS_APPLE_SIGNING == 'true' }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS=$(uuidgen)
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Codesign AU + VST3
        if: ${{ env.HAS_APPLE_SIGNING == 'true' }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bundle in "${{ steps.artifacts.outputs.au }}" "${{ steps.artifacts.outputs.vst3 }}"; do
            codesign --force --deep --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$bundle"
            codesign --verify --deep --strict "$bundle"
          done

      - name: Notarize and staple
        if: ${{ env.HAS_APPLE_SIGNING == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent "${{ steps.artifacts.outputs.au }}" "$RUNNER_TEMP/au-notarize.zip"
          ditto -c -k --keepParent "${{ steps.artifacts.outputs.vst3 }}" "$RUNNER_TEMP/vst3-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/au-notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun notarytool submit "$RUNNER_TEMP/vst3-notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait

          xcrun stapler staple "${{ steps.artifacts.outputs.au }}"
          xcrun stapler staple "${{ steps.artifacts.outputs.vst3 }}"

      - name: Note signed build
        if: ${{ env.HAS_APPLE_SIGNING == 'true' }}
        run: echo "macOS build is signed and notarized (Developer ID + notarytool)."

      - name: Note unsigned build
        if: ${{ env.HAS_APPLE_SIGNING != 'true' }}
        run: echo "::warning::macOS signing is disabled (Apple secrets not yet added) — shipping an UNSIGNED macOS build. See README 'Releasing' for the secrets needed to sign/notarize."

      - name: Package zip
        run: |
          mkdir -p dist
          # Stage AU+VST3 into a clean dir first — the Release artefacts dir also contains
          # libMonarch_SharedCode.a (a static-lib build byproduct, not something end users install).
          STAGE="$RUNNER_TEMP/Monarch-of-Tone"
          mkdir -p "$STAGE/AU" "$STAGE/VST3"
          cp -R "${{ steps.artifacts.outputs.au }}" "$STAGE/AU/"
          cp -R "${{ steps.artifacts.outputs.vst3 }}" "$STAGE/VST3/"
          (cd "$RUNNER_TEMP" && zip -r "$GITHUB_WORKSPACE/dist/Monarch-of-Tone-${VERSION}-macOS.zip" "Monarch-of-Tone")

      - name: Build installer
        run: installer/macos/build_installer.sh "$VERSION" build/Monarch_artefacts/Release dist

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: macOS
          path: |
            dist/*.zip
            dist/*.pkg

  windows:
    name: Windows (VST3)
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Monarch_VST3 --parallel

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/Monarch_artefacts/Release/VST3/*" `
            -DestinationPath "dist/Monarch-of-Tone-$env:VERSION-Windows.zip"

      - name: Build installer
        shell: pwsh
        run: |
          $version = "$env:VERSION"

          $makensis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if ($makensis) {
            $makensisPath = $makensis.Source
          } else {
            $candidates = @(
              "$env:ProgramFiles\NSIS\makensis.exe",
              "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
            )
            $makensisPath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (-not $makensisPath) {
            Write-Host "makensis not found on this runner — installing via Chocolatey"
            choco install nsis -y --no-progress
            $makensisPath = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          }

          Write-Host "Using makensis at $makensisPath"
          & $makensisPath /DVERSION=$version /DARTEFACTS_DIR="$PWD\build\Monarch_artefacts\Release\VST3" installer\windows\Monarch.nsi

          # NSIS resolves a relative OutFile against the .nsi's own directory, not this process's
          # CWD — move the built installer into dist/ so the upload-artifact glob finds it.
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Move-Item "installer\windows\Monarch-of-Tone-$version-Windows-Installer.exe" "dist\"

      - uses: actions/upload-artifact@v7
        with:
          name: Windows
          path: |
            dist/*.zip
            dist/*.exe

  linux:
    name: Linux (VST3)
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev \
            libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Monarch_VST3 --parallel

      - name: Package zip
        run: |
          mkdir -p dist
          cd build/Monarch_artefacts/Release
          zip -r "$GITHUB_WORKSPACE/dist/Monarch-of-Tone-${VERSION}-Linux.zip" VST3
          cd "$GITHUB_WORKSPACE"

      - name: Build installer
        run: installer/linux/build_deb.sh "$VERSION" build/Monarch_artefacts/Release dist

      - uses: actions/upload-artifact@v7
        with:
          name: Linux
          path: |
            dist/*.zip
            dist/*.deb

  publish:
    name: Publish GitHub Release
    needs: [prepare, macos, windows, linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.prepare.outputs.version }}"
          name: "Monarch of Tone v${{ needs.prepare.outputs.version }}"
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.pkg
            dist/*.exe
            dist/*.deb
